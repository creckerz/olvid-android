name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build prodNogoogle debug APK
        working-directory: obv_messenger
        run: ./gradlew assembleProdNogoogleDebug

      - name: Build prodNogoogle release APK (unsigned)
        working-directory: obv_messenger
        run: ./gradlew assembleProdNogoogleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-prodNogoogle-debug
          path: obv_messenger/app/build/outputs/apk/prodNogoogle/debug/*.apk
          retention-days: 7

      - name: Upload release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: app-prodNogoogle-release-unsigned
          path: obv_messenger/app/build/outputs/apk/prodNogoogle/release/*.apk
          retention-days: 7
